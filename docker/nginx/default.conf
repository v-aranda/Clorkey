server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Segurança: oculta versão do servidor
    server_tokens off;

    # Tamanho máximo de upload (deve coincidir com php.ini)
    client_max_body_size 150M;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Roteamento principal do Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Processa scripts PHP via PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app-prod:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # Timeouts para operações longas
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;
    }

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\.(ht|git|env) {
        deny all;
    }

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
