services:

  # ===========================================================================
  # PERFIL DEV — php artisan serve + Vite HMR, código montado via bind mount
  # ===========================================================================
  app:
    profiles: [dev]
    build:
      context: ./clorkey
      dockerfile: Dockerfile
      target: dev
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    image: clorkey/app:dev
    container_name: clorkey-app-dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Bind mount para hot reload do código PHP
      - ./clorkey:/var/www/html
      # Preserva node_modules e vendor do container (não sobrescreve com os do host)
      - /var/www/html/node_modules
      - /var/www/html/vendor
      # PHP ini customizado
      - ./docker/php/php.ini:/etc/php/8.5/cli/conf.d/99-clorkey.ini:ro
    ports:
      - "${APP_PORT:-8080}:8000"
      # Exponha Vite na mesma porta do container para evitar mismatch de HMR
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - clorkey-network

  # ===========================================================================
  # PERFIL PROD — PHP-FPM otimizado, imagem self-contained sem bind mounts
  # ===========================================================================
  app-prod:
    profiles: [prod]
    build:
      context: ./clorkey
      dockerfile: Dockerfile
      target: prod
    image: clorkey/app:prod
    container_name: clorkey-app-prod
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker/php/php.ini:/etc/php/8.5/fpm/conf.d/99-clorkey.ini:ro
      # Volume compartilhado com nginx para servir assets públicos
      - clorkey-public:/var/www/html/public
    expose:
      - "9000"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm8.5 -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - clorkey-network

  nginx:
    profiles: [prod]
    image: nginx:1.27-alpine
    container_name: clorkey-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - clorkey-public:/var/www/html/public:ro
    depends_on:
      app-prod:
        condition: service_healthy
    networks:
      - clorkey-network

  # ===========================================================================
  # SERVIÇOS COMPARTILHADOS — disponíveis em ambos os perfis
  # ===========================================================================
  pgsql:
    profiles: [dev, prod]
    image: postgres:18-alpine
    container_name: clorkey-pgsql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Postgres 18+ expects a mount at /var/lib/postgresql (not /data) to avoid
      # the "unused mount/volume" guard in the entrypoint.
      - ./volumes/db:/var/lib/postgresql
    ports:
      - "${FORWARD_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clorkey-network

  redis:
    profiles: [dev, prod]
    image: redis:7.4-alpine
    container_name: clorkey-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      # Named volume avoids host-permission issues seen with bind mount
      - redis-data:/data
    ports:
      - "${FORWARD_REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - clorkey-network

  minio:
    profiles: [dev, prod]
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: clorkey-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9090"
    volumes:
      - ./volumes/minio:/data
    ports:
      - "${FORWARD_MINIO_PORT:-9001}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-8901}:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - clorkey-network

  # Cria o bucket S3 no MinIO durante startup
  createbuckets:
    profiles: [dev, prod]
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: clorkey-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
        mc mb --ignore-existing minio/${AWS_BUCKET};
        mc anonymous set download minio/${AWS_BUCKET};
        exit 0;
      "
    networks:
      - clorkey-network

 
# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # Volume interno para compartilhar public/ entre app-prod e nginx (prod only)
  clorkey-public:
  redis-data:

# =============================================================================
# REDE
# =============================================================================
networks:
  clorkey-network:
    driver: bridge
    name: clorkey-network
